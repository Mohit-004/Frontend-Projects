<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <!-- Header + Dark Mode -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>🚀 Smart Todo App</h2>
        <button id="themeBtn" onclick="toggleDarkMode()" class="btn btn-dark btn-sm">
            🌙 Dark Mode
        </button>
    </div>

    <!-- Input Section -->
    <div class="card p-3 shadow">
        <input type="text" id="taskInput" class="form-control mb-2" placeholder="Enter task">

        <input type="date" id="dueDate" class="form-control mb-2">

        <select id="priority" class="form-select mb-2">
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
        </select>

        <button onclick="addTask()" class="btn btn-primary w-100">Add Task</button>
    </div>

    <!-- Search -->
    <input type="text" id="search" class="form-control mt-3" placeholder="Search task..." onkeyup="renderTasks()">

    <!-- Progress -->
    <div class="progress mt-3">
        <div id="progressBar" class="progress-bar bg-success" style="width: 0%">0%</div>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="list-group mt-3"></ul>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
