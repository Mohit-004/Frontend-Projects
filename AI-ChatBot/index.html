<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Website with Loader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">

    <style>
        /* Loader Styles */
        #loader {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <nav>
        <div>
            <img src="./img1.jpg" alt="logo">
        </div>
        <div class="nav-opt">
            <i class="fa-solid fa-user"></i>
        </div>
    </nav>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradChatbot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6A11CB; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575FC; stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A11CB; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2575FC; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AI Icon with Gradient -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="40" height="40" rx="10" ry="10" fill="url(#gradIcon)"/>
    <circle cx="12" cy="12" r="3" fill="#fff"/>
    <circle cx="28" cy="12" r="3" fill="#fff"/>
    <circle cx="20" cy="20" r="3" fill="#fff"/>
    <circle cx="12" cy="28" r="3" fill="#fff"/>
    <circle cx="28" cy="28" r="3" fill="#fff"/>
    <line x1="12" y1="12" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
    <line x1="28" y1="12" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
    <line x1="12" y1="28" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
    <line x1="28" y1="28" x2="20" y2="20" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Logo Text -->
  <text x="60" y="38" font-family="Poppins, sans-serif" font-size="24" font-weight="700">
    <tspan fill="url(#gradChatbot)">AI</tspan>
    <tspan fill="url(#gradChatbot)"> Chatbot</tspan>
  </text>
</svg>


        </div>
        <div class="sidebar-content">
            <p>Ask me anything!</p>
        </div>
        <button id="toggleBtn" class="toggle-btn">☰</button>
    </div>


    <div class="main-content ">
        <div>
            <div class="chat-section" id="chat-section">
                <div class="mid-section" id="mid-section">
                    <p id="welcome-msg">Welcome to AI ChatBot</p>
                </div>

            </div>
            <div class="prompt-section">
                <textarea id="input-area"></textarea>
                <i id="send-btn" class="fa fa-play-circle" aria-hidden="true"></i>
            </div>

        </div>

    </div>


    

    <script src="/main.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>

</html>
