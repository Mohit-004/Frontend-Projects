<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Password Generator</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <!-- Heading -->
    <h1>Password Generator</h1>

    <!-- Password Display -->
    <input
      type="text"
      id="password"
      placeholder="Generated Password"
      readonly
    />

    <!-- Password Strength -->
    <p id="strength">
      Password Strength: Weak
    </p>

    <!-- Password Length -->
    <div class="input-group">

      <label for="length">
        Password Length
      </label>

      <input
        type="number"
        id="length"
        min="4"
        max="30"
        value="12"
      />

    </div>

    <!-- Password Options -->
    <div class="options">

      <!-- Uppercase -->
      <label>

        <input
          type="checkbox"
          id="uppercase"
          checked
        />

        Uppercase Letters

      </label>

      <!-- Lowercase -->
      <label>

        <input
          type="checkbox"
          id="lowercase"
          checked
        />

        Lowercase Letters

      </label>

      <!-- Numbers -->
      <label>

        <input
          type="checkbox"
          id="numbers"
          checked
        />

        Numbers

      </label>

      <!-- Symbols -->
      <label>

        <input
          type="checkbox"
          id="symbols"
        />

        Symbols

      </label>

    </div>

    <!-- Buttons -->
    <div class="buttons">

      <button onclick="generatePassword()">
        Generate Password
      </button>

      <button onclick="copyPassword()">
        Copy Password
      </button>

    </div>

  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>

</html>
